<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>URL Shortener</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f1117; color: #e1e4e8; min-height: 100vh;
      display: flex; flex-direction: column; align-items: center;
      padding: 2rem;
    }
    h1 { font-size: 2rem; margin-bottom: 0.5rem; color: #58a6ff; }
    .subtitle { color: #8b949e; margin-bottom: 2rem; }
    .card {
      background: #161b22; border: 1px solid #30363d; border-radius: 8px;
      padding: 1.5rem; width: 100%; max-width: 600px; margin-bottom: 1.5rem;
    }
    .input-group { display: flex; gap: 0.5rem; }
    input[type="url"], input[type="text"] {
      flex: 1; padding: 0.75rem 1rem; background: #0d1117; border: 1px solid #30363d;
      border-radius: 6px; color: #e1e4e8; font-size: 1rem; outline: none;
    }
    input:focus { border-color: #58a6ff; }
    button {
      padding: 0.75rem 1.5rem; background: #238636; color: #fff; border: none;
      border-radius: 6px; font-size: 1rem; cursor: pointer; font-weight: 600;
    }
    button:hover { background: #2ea043; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .result {
      margin-top: 1rem; padding: 1rem; background: #0d1117;
      border-radius: 6px; display: none; word-break: break-all;
    }
    .result a { color: #58a6ff; text-decoration: none; }
    .result a:hover { text-decoration: underline; }
    .copy-btn {
      padding: 0.4rem 0.8rem; font-size: 0.85rem; background: #30363d;
      margin-left: 0.5rem;
    }
    .copy-btn:hover { background: #484f58; }
    #analytics-section h2 { font-size: 1.25rem; margin-bottom: 1rem; color: #c9d1d9; }
    table { width: 100%; border-collapse: collapse; }
    th, td {
      text-align: left; padding: 0.6rem 0.75rem; border-bottom: 1px solid #21262d;
      font-size: 0.9rem;
    }
    th { color: #8b949e; font-weight: 600; }
    td a { color: #58a6ff; text-decoration: none; }
    .clicks { color: #f0883e; font-weight: 600; }
    .empty { color: #8b949e; text-align: center; padding: 2rem; }
    .error { color: #f85149; margin-top: 0.5rem; }
    .refresh-btn { background: #30363d; font-size: 0.85rem; padding: 0.4rem 0.8rem; }
    .refresh-btn:hover { background: #484f58; }
    .header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
  </style>
</head>
<body>
  <h1>🔗 URL Shortener</h1>
  <p class="subtitle">Shorten your URLs with a serverless AWS backend</p>

  <div class="card">
    <div class="input-group">
      <input type="url" id="urlInput" placeholder="Paste a long URL here..." aria-label="URL to shorten">
      <button id="shortenBtn" onclick="shortenUrl()">Shorten</button>
    </div>
    <div class="result" id="result"></div>
    <div class="error" id="error"></div>
  </div>

  <div class="card" id="analytics-section">
    <div class="header-row">
      <h2>📊 Analytics</h2>
      <button class="refresh-btn" onclick="loadAnalytics()">Refresh</button>
    </div>
    <div id="analytics-content"><p class="empty">Loading...</p></div>
  </div>

  <script>
    // After deploying, set API_BASE to your API Gateway URL (see README)
    const API_BASE = window.API_BASE || 'https://coa51yah04.execute-api.ap-southeast-2.amazonaws.com/prod';

    async function shortenUrl() {
      const input = document.getElementById('urlInput');
      const resultDiv = document.getElementById('result');
      const errorDiv = document.getElementById('error');
      const btn = document.getElementById('shortenBtn');

      errorDiv.textContent = '';
      resultDiv.style.display = 'none';

      const url = input.value.trim();
      if (!url) { errorDiv.textContent = 'Please enter a URL'; return; }

      btn.disabled = true;
      btn.textContent = 'Shortening...';

      try {
        const res = await fetch(`${API_BASE}/create`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url }),
        });
        const data = await res.json();

        if (!res.ok) throw new Error(data.error || 'Failed to shorten URL');

        const shortUrl = data.short_url || `${API_BASE}/${data.short_code}`;
        resultDiv.innerHTML = `
          <span>Short URL: <a href="${shortUrl}" target="_blank">${shortUrl}</a></span>
          <button class="copy-btn" onclick="copyToClipboard('${shortUrl}')">Copy</button>
        `;
        resultDiv.style.display = 'block';
        input.value = '';
        loadAnalytics();
      } catch (err) {
        errorDiv.textContent = err.message;
      } finally {
        btn.disabled = false;
        btn.textContent = 'Shorten';
      }
    }

    function copyToClipboard(text) {
      navigator.clipboard.writeText(text).then(() => {
        const btns = document.querySelectorAll('.copy-btn');
        btns.forEach(b => { if (b.textContent !== 'Copied!') return; });
        event.target.textContent = 'Copied!';
        setTimeout(() => event.target.textContent = 'Copy', 1500);
      });
    }

    async function loadAnalytics() {
      const container = document.getElementById('analytics-content');
      try {
        const res = await fetch(`${API_BASE}/analytics`);
        const data = await res.json();

        if (!data.urls || data.urls.length === 0) {
          container.innerHTML = '<p class="empty">No URLs shortened yet. Create one above!</p>';
          return;
        }

        let html = `<table><thead><tr><th>Short Code</th><th>Destination</th><th>Clicks</th></tr></thead><tbody>`;
        data.urls.forEach(u => {
          const dest = u.long_url.length > 40 ? u.long_url.substring(0, 40) + '...' : u.long_url;
          html += `<tr>
            <td><a href="${API_BASE}/${u.short_code}" target="_blank">${u.short_code}</a></td>
            <td><a href="${u.long_url}" target="_blank" title="${u.long_url}">${dest}</a></td>
            <td class="clicks">${u.click_count}</td>
          </tr>`;
        });
        html += '</tbody></table>';
        container.innerHTML = html;
      } catch (err) {
        container.innerHTML = '<p class="empty">Failed to load analytics</p>';
      }
    }

    document.getElementById('urlInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') shortenUrl();
    });

    loadAnalytics();
  </script>
</body>
</html>
